[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Netlify defaults to Pretty URLs (strips trailing slashes) — matches Astro's
# trailingSlash: 'never' setting. No redirect rules needed.

# ─────────────────────────────────────────────────────────────────────────────
# Headers (WL-19 caching, WL-20 security). Netlify applies every matching block;
# more specific paths win per-key, so the global security headers below also
# cover /_astro/* and /fonts/*, which add their own Cache-Control on top.
# These only take effect on a Netlify deploy — verify post-deploy with the
# curl checks in docs/audits/get-right/audit.md.
# ─────────────────────────────────────────────────────────────────────────────

# Security headers — apply site-wide (WL-20).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HSTS: 1 year + subdomains. Confirm no plain-HTTP subdomain of
    # weknowthewhy.com exists before relying on includeSubDomains. No `preload`
    # — that's an irreversible commitment; add it deliberately later if wanted.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    # CSP staged REPORT-ONLY: it logs violations to the browser console but blocks
    # nothing, so production can't break while we watch it. 'unsafe-inline' is kept
    # because the ~6 inline scripts (Consent Mode, GTM loader, Plausible init,
    # banner, menu toggle) aren't nonced yet. Tightening to a nonce-based enforcing
    # CSP needs a Netlify Edge Function to inject per-request nonces — tracked as
    # the WL-20 follow-up. Allowlist covers GTM + Plausible + GA4 (loaded via GTM
    # only after consent).
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://plausible.io https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self'; connect-src 'self' https://plausible.io https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src https://www.googletagmanager.com"

# Content-hashed build assets — safe to cache forever (WL-19).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Self-hosted fonts — stable filenames; replace by renaming if a font ever changes.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
