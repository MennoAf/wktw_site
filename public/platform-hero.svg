<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none" role="img" aria-label="">
  <defs>
    <radialGradient id="bgglow" cx="50%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#C9A961" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0 H0 V26" fill="none" stroke="#C9A961" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <pattern id="gridLg" width="130" height="130" patternUnits="userSpaceOnUse">
      <path d="M130 0 H0 V130" fill="none" stroke="#C9A961" stroke-width="0.7" opacity="0.07"/>
    </pattern>
    <path id="glint" d="M0 -1 L0.18 -0.18 L1 0 L0.18 0.18 L0 1 L-0.18 0.18 L-1 0 L-0.18 -0.18 Z"/>
    <style>
      .tw { animation: tw 4.4s ease-in-out infinite; }
      .d1 { animation-delay: 0.9s; } .d2 { animation-delay: 1.9s; } .d3 { animation-delay: 2.8s; }
      @keyframes tw { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .tw { animation: none; } }
    </style>
  </defs>

  <!-- blueprint paper: faded grid + halo -->
  <rect x="0" y="0" width="520" height="440" fill="url(#grid)"/>
